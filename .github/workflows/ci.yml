name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  validate-manifest:
    name: Validate manifest.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -c "import json, sys; json.load(open('manifest.json')); print('manifest.json is valid')"

      - name: Check manifest version
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d['manifest_version'])")
          if [ "$VERSION" != "3" ]; then
            echo "ERROR: Expected manifest_version 3, got $VERSION"
            exit 1
          fi
          echo "manifest_version: $VERSION (OK)"

  pack:
    name: Pack extension
    runs-on: ubuntu-latest
    needs: [test, validate-manifest]
    steps:
      - uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          zip -r unclear-extension.zip \
            manifest.json \
            content.js \
            icon48.png \
            icon128.png

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unclear-extension
          path: unclear-extension.zip
          retention-days: 30
